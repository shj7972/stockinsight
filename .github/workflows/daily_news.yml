name: Periodic News Update

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Diagnostic
        run: |
          echo "WORKFLOW_VERSION=2026-03-13-v3"
          python --version
          pip --version

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "=== Installed Packages ==="
          pip list

      - name: Create Google Credentials File
        shell: bash
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS" ]; then
            echo "$GOOGLE_CREDENTIALS" > google-credentials.json
            echo "Google credentials file created."
          else
            echo "GOOGLE_CREDENTIALS secret not found. Indexing API will be skipped."
          fi

      - name: Run news update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Save hash before update
          OLD_HASH=""
          if [ -f static/news_data.json ]; then
            OLD_HASH=$(md5sum static/news_data.json | cut -d' ' -f1)
            echo "Before: hash=$OLD_HASH, size=$(wc -c < static/news_data.json) bytes"
            echo "OLD_HASH=$OLD_HASH" >> $GITHUB_ENV
          fi

          # Run the update
          python update_news.py || { echo "Python script failed with error code $?"; exit 1; }

      - name: Verify news update
        shell: python
        run: |
          import json
          import sys
          import os
          import hashlib

          try:
              if not os.path.exists("static/news_data.json"):
                  print("ERROR: news_data.json does not exist!")
                  sys.exit(1)
              
              with open("static/news_data.json", "r", encoding="utf-8") as f:
                  content = f.read()
                  if not content.strip():
                      print("ERROR: news_data.json is empty (0 bytes)!")
                      sys.exit(1)
                  d = json.loads(content)
              
              print(f"News items found: {len(d)}")
              if len(d) == 0:
                  print("ERROR: news_data.json contains an empty list!")
                  sys.exit(1)
              
              # Check for changes
              new_hash = hashlib.md5(content.encode("utf-8")).hexdigest()
              old_hash = os.environ.get("OLD_HASH", "")
              print(f"Old Hash: {old_hash}")
              print(f"New Hash: {new_hash}")
              
              if old_hash == new_hash:
                  print("WARNING: news_data.json content unchanged!")
              else:
                  print("SUCCESS: news_data.json was updated!")
                  
          except Exception as e:
              print(f"ERROR validating news_data.json: {e}")
              sys.exit(1)

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f static/news_data.json
          git diff --staged --quiet || (git commit -m "Auto-update news data [$(date -u '+%Y-%m-%d %H:%M UTC')]" && git pull --rebase && git push)
