name: Weekly Newsletter

on:
  schedule:
    # 매주 월요일 09:00 KST = 일요일 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 수동 실행 가능

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send weekly newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM: ${{ secrets.NEWSLETTER_FROM }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::warning::RESEND_API_KEY secret이 설정되지 않았습니다. 뉴스레터 발송을 건너뜁니다."
            echo "resend.com에서 API 키를 발급받아 GitHub Secrets에 RESEND_API_KEY로 등록하세요."
            exit 0
          fi
          python send_newsletter.py
