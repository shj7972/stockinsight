name: Weekly Newsletter

on:
  schedule:
    # 매주 월요일 09:00 KST = 일요일 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 수동 실행 가능

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send weekly newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM: ${{ secrets.NEWSLETTER_FROM }}
        run: |
          echo "Python version: $(python3 --version)"
          echo "RESEND_API_KEY set: $([ -n "$RESEND_API_KEY" ] && echo YES || echo NO)"

          if [ -z "$RESEND_API_KEY" ]; then
            echo "::warning::RESEND_API_KEY secret이 설정되지 않았습니다."
            echo "resend.com에서 API 키 발급 후 GitHub Settings > Secrets에 RESEND_API_KEY를 등록하세요."
            exit 0
          fi

          python3 send_newsletter.py
