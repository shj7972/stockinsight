name: Weekly Newsletter

on:
  schedule:
    # 매주 월요일 09:00 KST = 일요일 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check RESEND_API_KEY
        id: check_key
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::warning::RESEND_API_KEY secret is not set. Skipping newsletter send."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Send weekly newsletter
        if: steps.check_key.outputs.skip != 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM: ${{ secrets.NEWSLETTER_FROM }}
        run: python send_newsletter.py
