name: Daily Stock Discovery (8am KST)

on:
  schedule:
    # 23:00 UTC Sun–Thu = 08:00 KST Mon–Fri (UTC+9)
    - cron: '0 23 * * 0,1,2,3,4'
  workflow_dispatch: # 수동 트리거 허용

permissions:
  contents: write

jobs:
  stock-discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ml.txt
          echo "=== 설치된 패키지 ==="
          pip list | grep -E "scikit|xgboost|yfinance|pandas|numpy"

      - name: Run stock discovery
        run: |
          echo "종목 발굴 스크리닝 시작..."
          python update_stock_picks.py || { echo "스크립트 실패: $?"; exit 1; }

      - name: Verify output
        shell: python
        run: |
          import json, sys, os

          path = "static/stock_picks.json"
          if not os.path.exists(path):
              print("ERROR: stock_picks.json 생성 실패")
              sys.exit(1)

          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)

          history = data.get("picks_history", [])
          if not history:
              print("ERROR: picks_history 비어있음")
              sys.exit(1)

          today = history[0]
          us_cnt = len(today.get("us_picks", []))
          kr_cnt = len(today.get("kr_picks", []))
          print(f"SUCCESS: {today['date']} — US {us_cnt}종목, KR {kr_cnt}종목")
          print(f"이력 보관 일수: {len(history)}일")

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f static/stock_picks.json
          git diff --staged --quiet || (
            git commit -m "Auto-update stock picks [$(date -u '+%Y-%m-%d %H:%M UTC')]" &&
            git pull --rebase &&
            git push
          )
